<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="Aidan Diaz — retro pixel-art portfolio. Projects, about, and contact."
    />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("portfolio:theme");
          var theme =
            saved ||
            (window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "ps2"
              : "ps1");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (_) {
          document.documentElement.setAttribute("data-theme", "ps1");
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
    />
    <title>Aidan Diaz - Portfolio</title>
  </head>
  <body>
    <!--
      Hidden static form so Netlify's build-time scanner registers the
      "contact" form. The real React form posts here via fetch with the
      same field names. See: https://docs.netlify.com/forms/setup/
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
