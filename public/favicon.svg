<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pixel-art "AD" favicon. Hand-laid on a 16x16 grid so each rect maps to a
  single device pixel at the default favicon size, keeping the retro look
  crisp instead of antialiased. Colors mirror the PS2 theme tokens in
  src/styles/tokens.css: bg = color-bg (#070d22, PS2 BIOS navy),
  letters = color-accent (#4a9eff, PS2 BIOS blue),
  indicator = color-magenta (#ff6aae, PS-square pink).

  Letterforms are 5x7 cells, mounted on the 16x16 canvas at:
    A -> cols 3..7, rows 4..10
    D -> cols 9..13, rows 4..10
  The D uses a one-cell stair-step on the right edge so the curve reads
  as a curve at favicon scale; a flat right edge collapses into "O".
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 16 16"
     shape-rendering="crispEdges">
  <rect width="16" height="16" fill="#070d22"/>

  <g fill="#4a9eff">
    <!-- A: top cap, two legs, crossbar -->
    <rect x="4" y="4" width="3" height="1"/>
    <rect x="3" y="5" width="1" height="6"/>
    <rect x="7" y="5" width="1" height="6"/>
    <rect x="3" y="7" width="5" height="1"/>

    <!-- D: full-height left spine, top/bottom shoulders, stair pixels at the
         curve, and a shorter right spine. Together these form the rounded
         silhouette XXX / X..X / X...X / X...X / X...X / X..X / XXX. -->
    <rect x="9"  y="4"  width="1" height="7"/>
    <rect x="10" y="4"  width="2" height="1"/>
    <rect x="10" y="10" width="2" height="1"/>
    <rect x="12" y="5"  width="1" height="1"/>
    <rect x="12" y="9"  width="1" height="1"/>
    <rect x="13" y="6"  width="1" height="3"/>
  </g>

  <!-- Tiny magenta indicator pixel: same role as the PS-square pink in the
       intro screen text-shadow, a single chromatic accent that signals
       "retro UI" without crowding the letters. -->
  <rect x="14" y="1" width="1" height="1" fill="#ff6aae"/>
</svg>
